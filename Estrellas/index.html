<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Experiencia VR - Iglesia</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden; background-color: #000;">
    <a-scene device-orientation-permission-ui="enabled: true">
      
      <a-assets>
        <img id="textura" src="estrellas.jpg">
      </a-assets>

      <a-sky src="#textura" radius="6000" rotation="0 -90 0"></a-sky>

      <a-text 
        value="Cielos y tierra pasarán" 
        align="center" 
        color="#FFFFFF" 
        width="10" 
        position="0 3 -5"
        animation="property: position; to: 0 3.2 -5; dir: alternate; dur: 4000; loop: true; easing: easeInOutSine">
      </a-text>

      <a-entity camera look-controls fov="100"></a-entity>

    </a-scene>
  </body>
</html>
