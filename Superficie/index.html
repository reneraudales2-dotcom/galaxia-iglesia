<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <a-scene background="color: #000">
      <a-assets>
        <img id="suelo" src="la superficie.jpg">
      </a-assets>

      <a-videosphere 
        src="#suelo" 
        rotation="0 -90 0" 
        radius="5000"
        phi-length="360"
        theta-start="45"
        theta-length="90">
      </a-videosphere>

      <a-text 
        value="Toda la tierra esta llena de su gloria" 
        align="center" 
        color="#FFFFFF" 
        width="10" 
        position="0 1.5 -5">
      </a-text>

      <a-entity camera look-controls fov="90"></a-entity>
    </a-scene>
  </body>
</html>
