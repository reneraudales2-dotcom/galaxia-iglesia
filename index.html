<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Galaxia Iglesia</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden; background-color: #000;">
    <a-scene>
      
      <a-assets>
        <img id="cielo" src="galaxia.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#cielo" rotation="90 0 0"></a-sky>

      <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true; mouseEnabled: true"></a-entity>

    </a-scene>
  </body>
</html>
