<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Galaxia en la Iglesia</title>
    <meta name="description" content="Experiencia VR Galaxia">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene vr-mode-ui="enabled: true">
      
      <a-assets>
        <img id="galaxia" src="https://arjs-cors-proxy.herokuapp.com/https://raw.githack.com/aframevr/aframe/master/examples/boilerplate/panorama/puydesancy.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky color="#000033"></a-sky>

      <a-entity camera look-controls>
        <a-cursor color="#FF0000" opacity="0.5"></a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
