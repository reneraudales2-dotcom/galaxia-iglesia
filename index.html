<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Galaxia en la Iglesia</title>
    <meta name="description" content="Experiencia VR Galaxia">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene vr-mode-ui="enabled: true">
      
      <a-assets>
        <img id="galaxia" src="https://cdn.glitch.global/60d03565-3893-4a94-8a4a-f322303c7340/milky-way-360.jpg?v=1675852500000" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#galaxia" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls>
        <a-cursor color="#FF0000" opacity="0.5"></a-cursor>
      </a-entity>

    </a-scene>
  </body>
</html>
