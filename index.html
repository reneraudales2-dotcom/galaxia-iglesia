<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Galaxia VR Iglesia</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden; background-color: #000022;">
    <a-scene vr-mode-ui="enabled: true">
      
      <a-assets timeout="10000">
        <img id="cielo" src="./galaxia.jpg" crossorigin="anonymous">
      </a-assets>

      <a-sky src="#cielo" rotation="90 0 0" material="color: #000033"></a-sky>

      <a-entity camera look-controls="magicWindowTrackingEnabled: true; touchEnabled: true; mouseEnabled: true"></a-entity>

    </a-scene>
  </body>
</html>
